apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kubernetes-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 3
          periodSeconds: 5

        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
